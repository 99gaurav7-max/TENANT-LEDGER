<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenant Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:#1e293b;
  padding:30px;
  border-radius:14px;
  width:340px;
  box-shadow:0 12px 30px rgba(0,0,0,0.35);
}
h2{
  text-align:center;
  margin:0 0 20px 0;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
  outline:none;
}
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
  transition:all 0.2s ease;
}
button:hover{
  opacity:0.95;
  transform:translateY(-1px);
}
button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}
.error{
  color:#f87171;
  text-align:center;
  margin-top:12px;
  min-height:20px;
}
.success{
  color:#22c55e;
  text-align:center;
  margin-top:12px;
  min-height:20px;
}
.loader{
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,0.45);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  vertical-align:middle;
  margin-right:8px;
}
@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <h2>Tenant Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn" onclick="login()">Login</button>
  <div id="message" class="error"></div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xifmjdogllsabpnlvmzm.supabase.co",
  "sb_publishable_3hKqNzguct4AbduSjPuJNA_Bn5sqD1J"
);

function setMessage(text, type="error"){
  const el = document.getElementById("message");
  el.className = type === "success" ? "success" : "error";
  el.innerText = text;
}

function setLoginLoading(isLoading){
  const btn = document.getElementById("loginBtn");
  if(isLoading){
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Logging in...';
  }else{
    btn.disabled = false;
    btn.innerHTML = 'Login';
  }
}

async function checkSession(){
  const { data } = await supabaseClient.auth.getSession();
  if(data.session){
    window.location.href = "dashboard.html";
  }
}
checkSession();

async function login(){
  setMessage("");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    setMessage("Enter email and password.");
    return;
  }

  const proceed = confirm("Proceed to login?");
  if(!proceed) return;

  setLoginLoading(true);

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    setMessage(error.message);
    setLoginLoading(false);
    return;
  }

  setMessage("Login successful. Redirecting...", "success");
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 500);
}
</script>

</body>
</html>
