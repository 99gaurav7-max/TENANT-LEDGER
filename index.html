<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#1e293b;
  padding:30px;
  border-radius:14px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.4s ease;
}

.login-box.fade-out{
  opacity:0;
  transform:scale(0.95);
}

h2{
  margin-top:0;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
  box-sizing:border-box;
}

.password-wrap{
  position:relative;
}

.toggle-password{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:12px;
  color:#0f172a;
  background:#e5e7eb;
  padding:4px 6px;
  border-radius:6px;
}

/* ✅ FIXED REMEMBER ME */
.remember{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  font-size:14px;
  margin-top:8px;
  margin-bottom:6px;
}

.remember input{
  width:16px;
  height:16px;
  cursor:pointer;
}

.remember label{
  cursor:pointer;
  color:#cbd5e1;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  box-sizing:border-box;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

button:disabled{
  opacity:0.6;
}

.message{
  margin-top:10px;
  text-align:center;
}

.error{ color:#f87171; }
.success{ color:#22c55e; }

.loader{
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:8px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
  <h2>Owner Login</h2>

  <input id="email" type="email" placeholder="Enter email" autofocus>

  <div class="password-wrap">
    <input id="password" type="password" placeholder="Enter password">
    <span class="toggle-password" onclick="togglePassword()">Show</span>
  </div>

  <!-- ✅ FIXED POSITION -->
  <div class="remember">
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Remember Email</label>
  </div>

  <button id="loginBtn" onclick="login()">Login</button>

  <div id="msg" class="message"></div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xifmjdogllsabpnlvmzm.supabase.co",
  "sb_publishable_3hKqNzguct4AbduSjPuJNA_Bn5sqD1J"
);

let failedAttempts = 0;

function setMessage(text, type="success"){
  const el = document.getElementById("msg");
  el.className = "message " + (type === "success" ? "success" : "error");
  el.innerText = text;
}

function setLoading(loading){
  const btn = document.getElementById("loginBtn");
  if(loading){
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Logging in...';
  }else{
    btn.disabled = false;
    btn.innerText = "Login";
  }
}

function togglePassword(){
  const input = document.getElementById("password");
  const toggle = document.querySelector(".toggle-password");

  if(input.type === "password"){
    input.type = "text";
    toggle.innerText = "Hide";
  }else{
    input.type = "password";
    toggle.innerText = "Show";
  }
}

function saveEmail(email){
  if(document.getElementById("rememberMe").checked){
    localStorage.setItem("savedEmail", email);
  }else{
    localStorage.removeItem("savedEmail");
  }
}

function loadSavedEmail(){
  const saved = localStorage.getItem("savedEmail");
  if(saved){
    document.getElementById("email").value = saved;
    document.getElementById("rememberMe").checked = true;
  }
}

async function login(){
  setMessage("");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    setMessage("Enter email and password.", "error");
    return;
  }

  if(failedAttempts >= 5){
    setMessage("Too many failed attempts. Please refresh page.", "error");
    return;
  }

  setLoading(true);

  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  setLoading(false);

  if(error){
    failedAttempts++;
    setMessage(`Login failed (${failedAttempts}/5)`, "error");
    return;
  }

  saveEmail(email);

  setMessage("Login successful. Redirecting...", "success");

  document.getElementById("loginBox").classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 500);
}

document.addEventListener("keydown", function(event){
  if(event.key === "Enter"){
    login();
  }
});

async function checkSession(){
  const { data } = await supabaseClient.auth.getSession();
  if(data.session){
    window.location.href = "dashboard.html";
  }
}

loadSavedEmail();
checkSession();
</script>

</body>
</html>
