<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }
.header { display:flex; justify-content:space-between; padding:15px; background:#1e293b; }
.container { padding:20px; }
.card { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px; }

input, select {
  padding:8px; width:100%; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px 12px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

button:hover { opacity:0.9; }

table { width:100%; margin-top:10px; border-collapse:collapse; }
td, th { padding:8px; border-bottom:1px solid #334155; }

.success { color:#22c55e; }
.error { color:red; }
</style>
</head>

<body>

<div class="header">
  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">
<h3>Create Group</h3>
<select id="groupDropdown"></select>
<input id="rent" type="number" step="0.01" placeholder="Rent Amount">
<button onclick="createGroup()">Create</button>
<div id="groupMsg"></div>
</div>

<div class="card">
<h3>Add Tenant</h3>
<input id="tenantName" placeholder="Tenant Name">
<input id="phone" placeholder="+91XXXXXXXXXX">
<select id="groupSelect"></select>
<button onclick="addTenant()">Add Tenant</button>
<div id="tenantMsg"></div>
</div>

<div class="card">
<h3>Add Transaction</h3>
<select id="tenantSelect"></select>
<input id="amount" type="number" placeholder="Amount">
<button onclick="addTransaction()">Add</button>
<div id="txnMsg"></div>
</div>

<div class="card">
<h3>Groups</h3>
<table id="groupsTable"></table>
</div>

<div class="card">
<h3>Tenants</h3>
<table id="tenantsTable"></table>
</div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
"https://xifmjdogllsabpnlvmzm.supabase.co",
"sb_publishable_3hKqNzguct4AbduSjPuJNA_Bn5sqD1J"
);

async function checkUser(){
const {data}=await supabaseClient.auth.getSession();
if(!data.session) window.location.href="index.html";
else loadData();
}
checkUser();

function getAZ(){
return "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
}

async function loadData(){
const {data:groups}=await supabaseClient.from("groups").select("*");
const {data:tenants}=await supabaseClient.from("tenants").select("*");

const existing=groups.map(g=>g.group_name);

document.getElementById("groupDropdown").innerHTML=
getAZ().filter(g=>!existing.includes(g))
.map(g=>`<option>${g}</option>`).join("");

document.getElementById("groupSelect").innerHTML=
groups.map(g=>`<option value="${g.id}">${g.group_name}</option>`).join("");

document.getElementById("tenantSelect").innerHTML=
tenants.map(t=>`<option value="${t.id}">${t.tenant_name}</option>`).join("");

document.getElementById("groupsTable").innerHTML=
"<tr><th>Group</th><th>Rent</th></tr>"+
groups.map(g=>`<tr><td>${g.group_name}</td><td>${g.rent_amount}</td></tr>`).join("");

document.getElementById("tenantsTable").innerHTML=
"<tr><th>Name</th><th>Phone</th><th>Status</th></tr>"+
tenants.map(t=>`
<tr>
<td>${t.tenant_name}</td>
<td>${t.phone}</td>
<td>${t.is_active?"Active":"Inactive"}</td>
</tr>`).join("");
}

async function createGroup(){
if(!confirm("Create this group?")) return;

const name=document.getElementById("groupDropdown").value;
const rent=parseFloat(document.getElementById("rent").value);

if(!name||isNaN(rent)){
document.getElementById("groupMsg").innerText="Invalid input";
return;
}

await supabaseClient.from("groups").insert({group_name:name,rent_amount:rent});

document.getElementById("groupMsg").innerText="Group created";
loadData();
}

async function addTenant(){
if(!confirm("Add tenant?")) return;

const name=document.getElementById("tenantName").value;
const phone=document.getElementById("phone").value;
const group=document.getElementById("groupSelect").value;

if(!/^\+91\d{10}$/.test(phone)){
document.getElementById("tenantMsg").innerText="Invalid phone format";
return;
}

await supabaseClient.from("tenants").insert({
tenant_name:name,
phone:phone,
group_id:group,
active_from:new Date().toISOString().split("T")[0]
});

document.getElementById("tenantMsg").innerText="Tenant added";
loadData();
}

async function addTransaction(){
if(!confirm("Add transaction?")) return;

const tenant=document.getElementById("tenantSelect").value;
const amount=parseFloat(document.getElementById("amount").value);

if(isNaN(amount)){
document.getElementById("txnMsg").innerText="Invalid amount";
return;
}

await supabaseClient.from("transactions").insert({
tenant_id:tenant,
amount:amount,
payment_date:new Date().toISOString().split("T")[0]
});

document.getElementById("txnMsg").innerText="Transaction added";
}

async function logout(){
await supabaseClient.auth.signOut();
window.location.href="index.html";
}
</script>

</body>
</html>
