<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
  margin:0;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 16px;
  background:#1e293b;
  position:sticky;
  top:0;
  z-index:100;
}
.container{
  padding:20px;
}
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:14px;
  margin-bottom:18px;
}
.kpi-card{
  background:#1e293b;
  border-radius:14px;
  padding:16px;
  box-shadow:0 8px 22px rgba(0,0,0,0.22);
}
.kpi-title{
  font-size:13px;
  color:#cbd5e1;
  margin-bottom:8px;
}
.kpi-value{
  font-size:28px;
  font-weight:700;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 8px 22px rgba(0,0,0,0.22);
}
h2,h3{
  margin-top:0;
}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
}
@media (max-width:900px){
  .grid-2,.grid-3{
    grid-template-columns:1fr;
  }
}
.input-group{
  display:flex;
  flex-direction:column;
}
label{
  font-size:13px;
  color:#cbd5e1;
  margin-bottom:6px;
}
input, select{
  padding:10px;
  margin:0 0 10px 0;
  width:100%;
  border-radius:8px;
  border:none;
  box-sizing:border-box;
  outline:none;
}

/* ✅ BUTTON IMPROVED */
button{
  padding:12px 16px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  font-size:14px;
  letter-spacing:0.3px;
  min-width:130px;
  transition:all 0.2s ease;
}
button:hover{
  opacity:0.95;
  transform:translateY(-1px);
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* spacing improved */
.button-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
}

/* better colors */
.secondary{ background:#2563eb; }
.danger{ background:#dc2626; }
.warning{ background:#f59e0b; color:#111827; }
.muted{ background:#475569; }

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}
td, th{
  padding:10px 8px;
  border-bottom:1px solid #334155;
}
.table-wrap{
  overflow-x:auto;
}
.message{
  min-height:20px;
  margin-top:6px;
}
.success{ color:#22c55e; }
.error{ color:#f87171; }

.phone-wrap{
  display:flex;
  align-items:center;
  background:white;
  border-radius:8px;
  overflow:hidden;
}
.phone-prefix{
  padding:10px 12px;
  color:#111827;
  background:#e5e7eb;
  font-weight:700;
}

.filter-box{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Dashboard</h2>
  <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- FILTER UPDATED -->
<div class="card">
<h3>Transactions</h3>

<div class="filter-box">
  <div class="input-group">
    <label>From Date</label>
    <input id="txDateFrom" type="date" onchange="renderTransactionsTable()">
  </div>

  <div class="input-group">
    <label>To Date</label>
    <input id="txDateTo" type="date" onchange="renderTransactionsTable()">
  </div>
</div>

<div class="button-row">
  <button class="muted" onclick="clearTransactionFilters()">Reset Filters</button>
</div>

<table id="transactionsTable"></table>
</div>

</div>

<script>

/* ✅ FUTURE DATE DISABLED */
function setMaxDateToday(){
  const today = new Date().toISOString().split("T")[0];

  document.getElementById("paymentDate")?.setAttribute("max", today);
  document.getElementById("txDateFrom")?.setAttribute("max", today);
  document.getElementById("txDateTo")?.setAttribute("max", today);
}

/* UPDATED FILTER LOGIC */
function renderTransactionsTable(){
  const from = document.getElementById("txDateFrom").value;
  const to = document.getElementById("txDateTo").value;

  let filtered = [...transactionsData];

  if(from){
    filtered = filtered.filter(tx => tx.payment_date >= from);
  }
  if(to){
    filtered = filtered.filter(tx => tx.payment_date <= to);
  }

  const table = document.getElementById("transactionsTable");

  if(!filtered.length){
    table.innerHTML = `<tr><td>No transactions</td></tr>`;
    return;
  }

  table.innerHTML = `
  <tr>
    <th>Date</th>
    <th>Amount</th>
  </tr>` + filtered.map(tx=>`
  <tr>
    <td>${tx.payment_date}</td>
    <td>${tx.amount}</td>
  </tr>`).join("");
}

/* CLEAR FILTER UPDATED */
function clearTransactionFilters(){
  document.getElementById("txDateFrom").value="";
  document.getElementById("txDateTo").value="";
  renderTransactionsTable();
}

</script>

</body>
</html>
